name: CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  pre-push-security-gates:
    name: Pre-push Security Gates (Snyk + SonarQube)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_ORG: ${{ vars.SNYK_ORG }}
      SONARQUBE_URL: ${{ secrets.SONARQUBE_URL }}
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || github.repository }}
      SONAR_PROJECT_NAME: ${{ vars.SONAR_PROJECT_NAME || github.repository }}
      SONAR_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run Snyk Scan (blocking)
        run: bash scripts/ci/run-snyk-scan.sh
      - name: Run SonarQube Scan (blocking)
        run: bash scripts/ci/run-sonarqube-scan.sh
      - name: Upload Security Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-artifacts
          path: .artifacts/security/
          retention-days: 7

  typecheck:
    needs: pre-push-security-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cd worker && npm ci
      - run: cd mcp-server && npm ci
      # Root/Convex has known pre-existing implicit any errors
      - run: npx tsc --noEmit || true
      - run: cd worker && npx tsc --noEmit
      - run: cd mcp-server && npx tsc --noEmit

  lint:
    needs: pre-push-security-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/ci/assert-firecracker-deploy-config.sh
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test-convex-and-frontend:
    needs: pre-push-security-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test -- --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-root
          path: coverage/

  test-worker:
    needs: pre-push-security-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd worker && npm ci
      - run: cd worker && npm test -- --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-worker
          path: worker/coverage/

  test-mcp:
    needs: pre-push-security-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd worker && npm ci
      - run: cd mcp-server && npm ci
      - run: cd mcp-server && npm test -- --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-mcp
          path: mcp-server/coverage/

  release-readiness-mcp:
    needs: pre-push-security-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd worker && npm ci
      - run: cd mcp-server && npm ci
      - run: cd mcp-server && npm run test
      - run: cd mcp-server && npx tsc --noEmit
      - run: cd mcp-server && npm audit --omit=dev
      - run: cd mcp-server && npm run prepack
      - run: cd mcp-server && npm run pack:check
