services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arcagent

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CONVEX_URL: ${NEXT_PUBLIC_CONVEX_URL:-https://placeholder.convex.cloud}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_placeholder}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
        NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL:-/dashboard}
        NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL:-/dashboard}
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    networks:
      - arcagent

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - path: ./worker/.env
        required: true
      - path: ./worker/.env.generated
        required: false
    environment:
      - REDIS_URL=redis://redis:6379
      - WORKER_EXECUTION_BACKEND=process
      - SONARQUBE_URL=${SONARQUBE_URL:-http://sonarqube:9000}
    depends_on:
      redis:
        condition: service_healthy
      sonarqube:
        condition: service_healthy
        required: false
    networks:
      - arcagent

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    env_file:
      - path: ./mcp-server/.env
        required: true
    environment:
      - MCP_TRANSPORT=http
      - MCP_PORT=3002
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - arcagent

  sonarqube-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: sonarqube
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube-db-data:/var/lib/postgresql/data
    networks:
      - arcagent
    profiles:
      - sonarqube

  sonarqube:
    image: sonarqube:community
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: sonarqube
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
    depends_on:
      sonarqube-db:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/system/status | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - arcagent
    profiles:
      - sonarqube

volumes:
  redis-data:
  sonarqube-db-data:
  sonarqube-data:
  sonarqube-extensions:

networks:
  arcagent:
    driver: bridge
